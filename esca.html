<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>esca2.xyz - 놀이터</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&family=Teko:wght@400;600&family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-red: #ff3366;
            --neon-orange: #ffaa00;
            --dark-bg: #03050a;
            --ui-gray: #1a1f2b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--dark-bg);
            font-family: 'Noto Sans KR', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(0, 229, 255, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 99; opacity: 0.4;
        }

        @keyframes screenShake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-10px, 10px); }
            40% { transform: translate(10px, -10px); }
            60% { transform: translate(-10px, -10px); }
            80% { transform: translate(10px, 10px); }
            100% { transform: translate(0, 0); }
        }
        body.shake { animation: screenShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .header h1 {
            font-family: 'Oswald', sans-serif; font-size: 45px; letter-spacing: 5px;
            color: #fff; text-shadow: 0 0 15px rgba(0, 229, 255, 0.4); margin-bottom: -5px;
        }
        .header h1 span { color: var(--neon-red); }
        .header p { font-size: 16px; color: var(--neon-cyan); letter-spacing: 3px; font-weight: 700; }

        .admin-panel {
            display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 700px;
            background: rgba(10, 15, 25, 0.8); border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 20px; border-radius: 10px; margin-bottom: 20px; backdrop-filter: blur(5px);
        }

        /* 상단 유틸리티 버튼 스타일 */
        .panel-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .util-btn {
            background: transparent; border: 1px solid #444; color: #888;
            font-size: 12px; font-weight: 700; padding: 5px 12px; cursor: pointer;
            transition: 0.2s; letter-spacing: 1px;
        }
        .util-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .armor-select { display: flex; gap: 10px; width: 100%; margin-bottom: 5px; }
        .armor-btn {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #888;
            font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
            padding: 10px; cursor: pointer; transition: 0.3s;
        }
        .armor-btn.active {
            background: rgba(0, 229, 255, 0.15); border-color: var(--neon-cyan); color: var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .input-group { display: flex; gap: 10px; width: 100%; }
        input {
            flex: 2; background: #050811; border: 1px solid #333; color: var(--neon-cyan);
            font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
            padding: 12px 15px; outline: none; transition: 0.3s; text-align: center;
        }
        input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }

        button.btn-tactical {
            flex: 1; background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
            font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
            letter-spacing: 2px; padding: 12px; cursor: pointer; transition: 0.3s;
        }
        button.btn-tactical:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }

        button#fireBtn {
            background: var(--neon-red); border-color: var(--neon-red); color: #fff;
            display: none; font-size: 22px; letter-spacing: 5px; padding: 15px; margin-top: 10px;
        }
        button#fireBtn:hover {
            background: transparent; color: var(--neon-red);
            box-shadow: inset 0 0 15px var(--neon-red), 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .game-area { display: flex; gap: 30px; width: 100%; justify-content: center; align-items: flex-start; }
        .canvas-wrapper { position: relative; width: 100%; max-width: 550px; aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; }
        #rouletteCanvas { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        .ranking-board { width: 300px; background: rgba(20, 5, 10, 0.8); border: 1px solid var(--neon-red); padding: 20px; border-radius: 10px; display: none; box-shadow: 0 0 20px rgba(255, 51, 102, 0.1); }
        .ranking-title { font-size: 18px; font-weight: 900; color: var(--neon-red); text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--neon-red); letter-spacing: 2px; }
        .ranking-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .ranking-list li { background: rgba(255, 51, 102, 0.1); border-left: 3px solid var(--neon-red); padding: 10px; font-size: 15px; font-weight: 700; color: #ddd; display: flex; justify-content: space-between; animation: slideIn 0.3s ease-out forwards; }
        .ranking-list li .rank-num { color: var(--neon-red); }
        .survivor { margin-top: 15px; padding: 15px; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); text-align: center; font-weight: 900; font-size: 18px; animation: pulse 1s infinite alternate; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { from { box-shadow: 0 0 10px rgba(0,229,255,0.2); } to { box-shadow: 0 0 20px rgba(0,229,255,0.6); } }

        /* 🚨 커스텀 알럿 */
        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(5px); }
        .custom-alert-overlay.show { opacity: 1; pointer-events: auto; }
        .alert-box { background: rgba(10, 15, 25, 0.95); border: 1px solid var(--neon-red); padding: 30px 40px; text-align: center; box-shadow: 0 0 30px rgba(255, 51, 102, 0.3); border-radius: 5px; transform: scale(0.9); transition: 0.3s; min-width: 350px; }
        .custom-alert-overlay.show .alert-box { transform: scale(1); }
        .alert-title { font-family: 'Oswald', sans-serif; color: var(--neon-red); font-size: 26px; letter-spacing: 3px; margin-bottom: 15px; border-bottom: 1px solid var(--neon-red); padding-bottom: 10px; }
        .alert-msg { font-size: 17px; color: #fff; margin-bottom: 25px; font-weight: 500; line-height: 1.5; }

        @media (max-width: 768px) { .header h1 { font-size: 35px; } .input-group { flex-direction: column; } .game-area { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1>ESCA : <span>러시안 룰렛</span></h1>
            <p>데스매치 // 최후의 1인을 가려라</p>
        </div>
        
        <div class="admin-panel">
            <div class="panel-top-row">
                <button class="util-btn" onclick="location.href='index.html'">← 메인페이지</button>
                <button class="util-btn" onclick="resetAll()">시스템 초기화</button>
            </div>

            <div class="armor-select">
                <button class="armor-btn active" id="armor1" onclick="setArmor(1)">1레벨 조끼 (1 HP)</button>
                <button class="armor-btn" id="armor2" onclick="setArmor(2)">2레벨 조끼 (2 HP)</button>
            </div>

            <div class="input-group">
                <input type="text" id="namesInput" placeholder="타겟 이름 입력 (쉼표로 구분)">
                <button class="btn-tactical" onclick="initGame()">타겟 장전</button>
            </div>
            <button class="btn-tactical" id="fireBtn" onclick="startRoulette()">격발 (발사)</button>
        </div>

        <div class="game-area">
            <div class="canvas-wrapper">
                <canvas id="rouletteCanvas" width="800" height="800"></canvas>
            </div>

            <div class="ranking-board" id="rankingBoard">
                <div class="ranking-title">💀 사망자 명단</div>
                <ul class="ranking-list" id="rankingList"></ul>
                <div id="survivorBox"></div>
            </div>
        </div>
    </div>

    <div id="customAlert" class="custom-alert-overlay">
        <div class="alert-box" id="alertBox">
            <div class="alert-title" id="alertTitle">SYSTEM ERROR</div>
            <div class="alert-msg" id="alertMsg">에러 메시지 출력</div>
            <button class="btn-tactical alert-btn" onclick="closeAlert()">확인 (ACK)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        
        let players = [];
        let deadCount = 0;
        let particles = [];
        let angle = 0;
        let targetAngle = 0;
        let isSpinning = false;
        let isFired = false;
        let currentWinner = null;
        let animationFrameId;
        let gunType = 0; 
        let radarAngle = 0;
        let selectedArmor = 1;

        function setArmor(level) {
            selectedArmor = level;
            document.getElementById('armor1').classList.remove('active');
            document.getElementById('armor2').classList.remove('active');
            document.getElementById('armor' + level).classList.add('active');
        }

        function showCustomAlert(msg, type = 'error') {
            const overlay = document.getElementById('customAlert');
            const alertBox = document.getElementById('alertBox');
            const title = document.getElementById('alertTitle');
            const msgBox = document.getElementById('alertMsg');
            msgBox.innerHTML = msg;
            if (type === 'error') {
                alertBox.classList.remove('info-mode');
                title.innerText = 'SYSTEM WARNING';
                title.style.color = 'var(--neon-red)';
            } else {
                alertBox.classList.add('info-mode');
                title.innerText = 'SYSTEM INFO';
                title.style.color = 'var(--neon-cyan)';
            }
            overlay.classList.add('show');
        }

        function closeAlert() { document.getElementById('customAlert').classList.remove('show'); }

        function resetAll() {
            document.getElementById('namesInput').value = '';
            players = [];
            deadCount = 0;
            particles = [];
            isSpinning = false;
            isFired = false;
            document.getElementById('rankingBoard').style.display = 'none';
            document.getElementById('rankingList').innerHTML = '';
            document.getElementById('survivorBox').innerHTML = '';
            document.getElementById('fireBtn').style.display = 'none';
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            showCustomAlert("시스템이 초기화되었습니다.", 'info');
        }

        class Player {
            constructor(name, index, total, maxHp) {
                this.name = name;
                this.index = index;
                this.angle = (index / total) * Math.PI * 2;
                this.radius = 280; 
                this.x = 400 + Math.cos(this.angle) * this.radius;
                this.y = 400 + Math.sin(this.angle) * this.radius;
                this.maxHp = maxHp;
                this.hp = maxHp;
                this.isDead = false;
                this.justHit = false;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI/2); 
                if (this.justHit && this.hp > 0) {
                    ctx.fillStyle = 'var(--neon-orange)'; ctx.shadowColor = 'var(--neon-orange)'; ctx.shadowBlur = 20; ctx.font = '900 24px Noto Sans KR';
                } else if (this.justHit && this.hp === 0) {
                    ctx.fillStyle = 'var(--neon-red)'; ctx.shadowColor = 'var(--neon-red)'; ctx.shadowBlur = 20; ctx.font = '900 24px Noto Sans KR';
                } else if (this.isDead) {
                    ctx.fillStyle = '#444'; ctx.shadowBlur = 0; ctx.font = '500 20px Noto Sans KR';
                } else {
                    ctx.fillStyle = '#00e5ff'; ctx.shadowColor = 'rgba(0, 229, 255, 0.5)'; ctx.shadowBlur = 10; ctx.font = '700 22px Noto Sans KR';
                }
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.isDead && !this.justHit ? `[ ❌ ${this.name} ]` : `[ ${this.name} ]`, 0, 0);

                let boxW = 15, boxH = 6, gap = 5;
                let totalW = (this.maxHp * boxW) + ((this.maxHp - 1) * gap);
                let startX = -totalW / 2, startY = 20;
                for(let i=0; i < this.maxHp; i++) {
                    ctx.fillStyle = (i < this.hp) ? ((this.hp === 1 && this.maxHp === 2) ? 'var(--neon-orange)' : '#00e5ff') : '#222';
                    ctx.shadowBlur = (i < this.hp) ? 10 : 0;
                    ctx.fillRect(startX + (i * (boxW + gap)), startY, boxW, boxH);
                }
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                const a = Math.random() * Math.PI * 2;
                const v = Math.random() * 8 + 2;
                this.vx = Math.cos(a) * v; this.vy = Math.sin(a) * v;
                this.life = 1.0; this.decay = Math.random() * 0.02 + 0.02;
                this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; ctx.shadowBlur = 0; }
        }

        function initGame() {
            const input = document.getElementById('namesInput').value;
            if(!input.trim()) return showCustomAlert("타겟 이름을 입력하십시오.<br>(쉼표로 구분)", 'error');
            const names = input.split(',').map(n => n.trim()).filter(n => n);
            if(names.length < 2) return showCustomAlert("최소 2명 이상의 타겟이 필요합니다.", 'error');

            players = names.map((name, i) => new Player(name, i, names.length, selectedArmor));
            deadCount = 0; particles = []; isFired = false; angle = 0; radarAngle = 0;
            gunType = Math.floor(Math.random() * 3);
            document.getElementById('rankingBoard').style.display = 'block';
            document.getElementById('rankingList').innerHTML = '';
            document.getElementById('survivorBox').innerHTML = '';
            document.getElementById('fireBtn').style.display = 'block';
            document.getElementById('fireBtn').innerText = '격발 (발사)';
            document.getElementById('fireBtn').style.background = 'var(--neon-red)';
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function drawGun(rot) {
            ctx.save(); ctx.translate(400, 400); ctx.rotate(rot);
            ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI * 2); ctx.fillStyle = '#111'; ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 3; ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#222'; ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2;
            if (gunType === 0) {
                ctx.fillRect(0, -10, 100, 20); ctx.strokeRect(0, -10, 100, 20);
                ctx.fillStyle = isSpinning ? '#ff3366' : '#00e5ff'; ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fillRect(90, -8, 15, 16);
            } else if (gunType === 1) {
                ctx.fillRect(0, -18, 100, 10); ctx.strokeRect(0, -18, 100, 10); ctx.fillRect(0, 8, 100, 10); ctx.strokeRect(0, 8, 100, 10);
                ctx.fillStyle = isSpinning ? '#ff3366' : '#00e5ff'; ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fillRect(90, -16, 15, 6); ctx.fillRect(90, 10, 15, 6);
            } else {
                ctx.fillRect(0, -15, 80, 30); ctx.strokeRect(0, -15, 80, 30); ctx.fillRect(60, -25, 50, 8); ctx.strokeRect(60, -25, 50, 8); ctx.fillRect(60, 17, 50, 8); ctx.strokeRect(60, 17, 50, 8);
                ctx.fillStyle = isSpinning ? '#ff3366' : '#00e5ff'; ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fillRect(100, -23, 10, 4); ctx.fillRect(100, 19, 10, 4); ctx.fillRect(70, -5, 15, 10); 
            }
            ctx.restore();
        }

        function startRoulette() {
            if (isSpinning) return;
            let alivePlayers = players.filter(p => !p.isDead);
            if (alivePlayers.length <= 1) return showCustomAlert("게임이 종료되었습니다.<br>타겟을 다시 장전하십시오.", 'info');

            players.forEach(p => p.justHit = false);
            particles = []; isFired = false; isSpinning = true;
            document.body.classList.remove('shake');
            currentWinner = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
            targetAngle = currentWinner.angle;
            let spins = Math.PI * 2 * (Math.floor(Math.random() * 8) + 10); 
            let startRotation = angle, duration = Math.random() * 2500 + 3000, startTime = performance.now();

            function animate(time) {
                let progress = (time - startTime) / duration;
                if (progress > 1) progress = 1;
                angle = startRotation + (targetAngle + spins - startRotation) * (1 - Math.pow(1 - progress, 4));
                if (progress < 1) animationFrameId = requestAnimationFrame(animate);
                else { angle = targetAngle; isSpinning = false; fireLaser(); }
            }
            animationFrameId = requestAnimationFrame(animate);
        }

        function fireLaser() {
            isFired = true; currentWinner.hp -= 1; currentWinner.justHit = true;
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 300);
            let particleColor = (currentWinner.hp > 0) ? '#ffaa00' : '#ff3366';
            for(let i=0; i<60; i++) particles.push(new Particle(currentWinner.x, currentWinner.y, particleColor));

            if (currentWinner.hp <= 0) {
                currentWinner.isDead = true; deadCount++;
                const ul = document.getElementById('rankingList'), li = document.createElement('li');
                li.innerHTML = `<span class="rank-num">${deadCount}번째 탈락</span> <span>${currentWinner.name}</span>`;
                ul.appendChild(li); ul.scrollTop = ul.scrollHeight;
            }

            let alivePlayers = players.filter(p => !p.isDead);
            if (alivePlayers.length === 1) {
                setTimeout(() => {
                    document.getElementById('survivorBox').innerHTML = `<div class="survivor">👑 최후의 생존자 : ${alivePlayers[0].name}</div>`;
                    document.getElementById('fireBtn').innerText = '게임 종료';
                    document.getElementById('fireBtn').style.background = '#444';
                    showCustomAlert(`작전 종료!<br>최후의 생존자는 <b>[ ${alivePlayers[0].name} ]</b> 입니다.`, 'info');
                }, 1000);
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            radarAngle += 0.005;
            ctx.save(); ctx.translate(400, 400); ctx.rotate(radarAngle); ctx.strokeStyle = 'rgba(0, 229, 255, 0.15)'; ctx.lineWidth = 1.5; ctx.setLineDash([15, 10]); 
            ctx.beginPath(); ctx.arc(0, 0, 300, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, 150, 0, Math.PI * 2); ctx.stroke(); ctx.restore();

            players.forEach(p => p.draw());
            drawGun(angle);

            if (isFired && currentWinner && currentWinner.justHit) {
                ctx.save(); ctx.beginPath();
                ctx.moveTo(400 + Math.cos(angle)*100, 400 + Math.sin(angle)*100); ctx.lineTo(currentWinner.x, currentWinner.y);
                let laserColor = (currentWinner.hp > 0) ? 'var(--neon-orange)' : 'var(--neon-red)';
                ctx.strokeStyle = laserColor; ctx.lineWidth = 8; ctx.shadowBlur = 25; ctx.shadowColor = laserColor; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(400 + Math.cos(angle)*100, 400 + Math.sin(angle)*100); ctx.lineTo(currentWinner.x, currentWinner.y);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.shadowBlur = 0; ctx.stroke(); ctx.restore();
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
