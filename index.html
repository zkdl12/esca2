<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>esca2.xyz - 메인 로비</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&family=Teko:wght@400;600&family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-red: #ff3366;
            --dark-bg: #03050a;
            --ui-gray: #1a1f2b;
            --text-glow: rgba(0, 229, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--dark-bg);
            font-family: 'Noto Sans KR', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 전술 레이더 느낌의 미세한 배경 그리드 */
            background-image: 
                radial-gradient(circle at center, rgba(0, 229, 255, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        /* 📺 스캔라인 효과 (화면 전체에 미세한 줄무늬) */
        body::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 99; opacity: 0.4;
        }

        /* 메인 컨테이너 */
        .hero-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
        }

        /* 🖼️ 에스카 프로필 (헥사곤 컷팅 & 네온 글로우) */
        .profile-hex {
            position: relative;
            width: 160px;
            height: 180px;
            margin-bottom: 20px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--ui-gray);
            padding: 4px; /* 테두리 두께 */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s ease;
        }

        .profile-hex::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-red));
            z-index: 1; opacity: 0.8;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 2;
            filter: grayscale(30%) contrast(1.2);
            transition: 0.5s ease;
        }

        .profile-hex:hover { transform: scale(1.05); }
        .profile-hex:hover .profile-img { filter: grayscale(0%) contrast(1.1); }

        /* 👑 메인 타이틀 (거대한 텍스트) */
        .title-glitch {
            font-family: 'Oswald', sans-serif;
            font-size: 100px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 15px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            margin-bottom: 5px;
            position: relative;
        }

        .subtitle {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--neon-blue);
            margin-bottom: 60px;
            text-shadow: 0 0 10px var(--text-glow);
        }

        /* 🎮 택티컬 네비게이션 메뉴 */
        .nav-menu {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        .nav-btn {
            position: relative;
            flex: 1;
            max-width: 300px;
            padding: 20px 30px;
            text-decoration: none;
            background: rgba(26, 31, 43, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: #fff;
            text-align: center;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* 사선 컷팅 */
            clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
        }

        /* 버튼 내부 텍스트 */
        .nav-title {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
            transition: 0.3s;
        }

        .nav-desc {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px;
            font-weight: 300;
            color: #888;
            position: relative;
            z-index: 2;
            transition: 0.3s;
        }

        /* 호버 시 왼쪽에서 빛이 차오르는 효과 */
        .nav-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--neon-blue);
            transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
        }

        .nav-btn:hover {
            border-color: var(--neon-blue);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.2);
        }

        .nav-btn:hover::before { left: 0; }
        .nav-btn:hover .nav-title { color: #000; }
        .nav-btn:hover .nav-desc { color: rgba(0,0,0,0.7); }

        /* 🔫 하단 워터마크 (FPS GOAT 롤백) */
        .bg-watermark {
            position: absolute;
            bottom: -2vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Oswald', sans-serif; /* 영어 간지 폰트로 롤백 */
            font-size: 15vw; /* 폰트 크기 살짝 키움 */
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            user-select: none;
        }

        /* 📱 모바일 최적화 */
        @media (max-width: 768px) {
            .profile-hex { width: 120px; height: 135px; }
            .title-glitch { font-size: 60px; letter-spacing: 8px; }
            .subtitle { font-size: 16px; letter-spacing: 4px; margin-bottom: 40px; }
            .nav-menu { flex-direction: column; align-items: center; gap: 15px; }
            .nav-btn { width: 100%; max-width: 100%; padding: 15px; }
            .bg-watermark { font-size: 25vw; bottom: 5vh; }
        }
    </style>
</head>
<body>

    <div class="bg-watermark">FPS GOAT</div>

    <div class="hero-container">
        <div class="profile-hex">
            <img src="https://img.insight.co.kr/static/2019/06/20/700/axh113m6rq99crscr6bb.jpg" alt="ESCA" class="profile-img">
        </div>

        <h1 class="title-glitch">ESCA</h1>
       /* <div class="subtitle">THE LEGACY // 영구결번 No.2</div> */

        <div class="nav-menu">
            <a href="team.html" class="nav-btn">
                <div class="nav-title">스쿼드 작전 편성</div>
                <div class="nav-desc">종목별 팀 매칭 시스템</div>
            </a>
            <a href="esca.html" class="nav-btn">
                <div class="nav-title">데스매치 룰렛</div>
                <div class="nav-desc">커스텀 룰렛 및 벌칙 추첨</div>
            </a>
            <a href="info.html" class="nav-btn">
                <div class="nav-title">에스카 정보</div>
                <div class="nav-desc">에스카 역대 커리어 기록</div>
            </a>
        </div>
    </div>

</body>
</html>
